spring.application.name=minimarket

# Base de datos H2 persistente local
spring.datasource.url=jdbc:h2:file:./data/minimarketdb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# Consola H2
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.defer-datasource-initialization=true
spring.jpa.open-in-view=false

# Seguridad JWT
jwt.secret=${JWT_SECRET:clave_secreta_minimarket_plus_2026_segura_minimo_32_caracteres}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Servidor
server.port=8080

# Actuator (para la pauta)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never